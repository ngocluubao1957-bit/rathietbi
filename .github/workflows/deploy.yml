name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        run: |
          sed -i \
            -e "s|__GH_TOKEN__|${{ secrets.GH_TOKEN }}|g" \
            -e "s|__GH_OWNER__|${{ secrets.GH_OWNER }}|g" \
            -e "s|__GH_REPO__|${{ secrets.GH_REPO }}|g" \
            -e "s|__GH_FILE__|${{ secrets.GH_FILE }}|g" \
            -e "s|__APP_TITLE__|${{ secrets.APP_TITLE }}|g" \
            -e "s|__APP_ORG__|${{ secrets.APP_ORG }}|g" \
            -e "s|__APP_DEADLINE__|${{ secrets.APP_DEADLINE }}|g" \
            -e "s|__ADMIN_KEY__|${{ secrets.ADMIN_KEY }}|g" \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
